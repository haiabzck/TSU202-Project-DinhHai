<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
    <link rel="stylesheet" href="../css/register.css">
</head>

<body>
    <div class="signup-container">
        <h1>Đăng ký tài khoản</h1>
        <p class="subtitle">Đăng ký tài khoản để sử dụng dịch vụ</p>

        <form action="./login.html" id="form-register">
            <div class="name-row">
                <div class="input-group">
                    <label>Họ và tên đệm</label>
                    <input type="text" id="firstname" name="firstName" />
                    <small class="error error-firstname"></small>
                </div>
                <div class="input-group">
                    <label>Tên</label>
                    <input type="text" id="lastname" name="lastName" />
                    <small class="error error-lastname"></small>
                </div>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@company.com"/>
                <small class="error error-email"></small>
            </div>

            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" />
                <small class="error error-password"></small>
            </div>

            <div class="input-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirm-password" name="confirmPassword" placeholder="Enter your confirm password" />
                <small class="error error-confirm-password"></small>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" />
                <label for="terms">Bạn đồng ý với <a href="#">chính sách và điều khoản</a></label>
                <small class="error"></small>
            </div>

            <button type="submit" class="btn-signup" id="submit">Đăng ký</button>
        </form>

        <p class="footer-text">Bạn đã có tài khoản? <a href="./login.html">Đăng nhập</a></p>
    </div>
    <script src="../js/register.js"></script>
</body>

</html>
