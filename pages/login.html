<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-card">
        <h1>Đăng nhập</h1>
        <p class="subtitle">Đăng nhập tài khoản để sử dụng hệ thống quản lý.</p>

        <form id="form-login">
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" id="email" placeholder="">
                <small class="error error-email"></small>
            </div>

            <div class="input-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" id="password" placeholder="">
                <small class="error error-password"></small>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Nhớ tài khoản
                </label>
                <a href="#" class="forgot-password">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>
        <p class="footer-link">Bạn chưa có tài khoản? <a href="./register.html">Đăng ký</a></p>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>
